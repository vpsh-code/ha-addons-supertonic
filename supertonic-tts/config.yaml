name: "Supertonic TTS"
description: "On-device neural TTS (31 languages) via Wyoming protocol. Powered by Supertonic 3 ONNX models."
version: "1.0.5"
slug: "supertonic_tts"
init: false
startup: "services"
boot: "auto"
homeassistant_api: false
auth_api: false
ingress: false

arch:
  - aarch64
  - amd64

ports:
  10200/tcp: 10200
ports_description:
  10200/tcp: "Wyoming TTS protocol"

options:
  voice: "F1"
  language: "en"
  quality: 4
  speed: 1.05

schema:
  voice: str
  language: str
  quality: int
  speed: float

url: "https://github.com/vpsh-code/ha-addons-supertonic"
